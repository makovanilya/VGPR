name: Rebuild index
on:
  push:
    paths: ["ratings/**"]
    branches: [main]

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python tools/indexer.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ratings/_index.md docs/ratings.json docs/*.md
          git diff --staged --quiet || git commit -m "chore: rebuild index"
          git push
